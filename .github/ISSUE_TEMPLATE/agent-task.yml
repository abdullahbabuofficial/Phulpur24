name: Agent task
description: Describe a focused task for Copilot or another coding agent.
title: "[agent] "
labels:
  - agent-task
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should the agent complete?
      placeholder: Add the feature, bug fix, or cleanup goal here.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Files, routes, or behavior the agent should focus on.
      placeholder: Mention specific routes, components, commands, or constraints.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance checks
      description: How should the agent verify the task?
      value: |
        - npm run lint
        - npx tsc --noEmit
        - npm audit
        - npm run build
    validations:
      required: true
