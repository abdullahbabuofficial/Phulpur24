name: Cleanup Cloudflare Worker (one-shot)

on:
  workflow_dispatch:

jobs:
  delete-worker:
    runs-on: ubuntu-latest
    steps:
      - name: Delete phulpur24-admin Worker
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_ACCESS_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          echo "Listing current workers in account..."
          curl -sS -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/workers/scripts" \
            | jq '.result[] | .id'

          echo ""
          echo "Deleting worker phulpur24-admin..."
          status=$(curl -sS -o /tmp/del.json -w "%{http_code}" -X DELETE \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/workers/scripts/phulpur24-admin?force=true")
          echo "HTTP $status"
          cat /tmp/del.json
          echo ""

          if [ "$status" != "200" ]; then
            echo "Delete failed"
            exit 1
          fi

          echo ""
          echo "Listing workers after delete..."
          curl -sS -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/workers/scripts" \
            | jq '.result[] | .id'
